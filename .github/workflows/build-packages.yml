name: Build Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 0.2.0)'
        required: true
        default: '0.2.0'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        run: pytest tests/ --ignore=tests/test_vision.py -q

      - name: Build obfuscated macOS package
        working-directory: packaging
        run: make macos-release VERSION=${{ steps.version.outputs.version }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/macos/*.dmg

  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Install fpm
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby-dev build-essential
          sudo gem install fpm

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        run: pytest tests/ --ignore=tests/test_vision.py -q

      - name: Build obfuscated Ubuntu package
        working-directory: packaging
        run: make ubuntu-release VERSION=${{ steps.version.outputs.version }}

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-deb
          path: dist/ubuntu/*.deb

  create-release:
    needs: [build-macos, build-ubuntu]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          # Grab everything between "## [$VERSION]" and the next "## [" header
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { in_section=1; next }
            in_section && /^## \[/ { exit }
            in_section { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No matching section in CHANGELOG.md for v$VERSION — falling back to auto-generated notes"
            echo "has_notes=false" >> $GITHUB_OUTPUT
          else
            echo "has_notes=true" >> $GITHUB_OUTPUT
          fi
          echo "--- release_notes.md preview ---"
          head -20 release_notes.md

      - name: Create GitHub Release (with CHANGELOG body)
        if: steps.notes.outputs.has_notes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            macos-dmg/*.dmg
            ubuntu-deb/*.deb
          body_path: release_notes.md
          draft: true

      - name: Create GitHub Release (auto-generated fallback)
        if: steps.notes.outputs.has_notes != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            macos-dmg/*.dmg
            ubuntu-deb/*.deb
          generate_release_notes: true
          draft: true
