name: Backfill _latest assets

# Manual one-shot to add `_latest` filename copies to a release that
# was built before the build-packages workflow added them automatically.
# After v0.3.2 is backfilled this workflow can be deleted; the regular
# build-packages workflow attaches the `_latest` files for every
# subsequent release.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to backfill (e.g. v0.3.2)'
        required: true
        default: 'v0.3.2'

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Download original assets from the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p assets && cd assets
          gh release download "${{ inputs.release_tag }}" -R "${{ github.repository }}"
          ls -lh

      - name: Create _latest renamed copies
        working-directory: assets
        run: |
          DEB=$(ls *.deb | head -1)
          DMG=$(ls *.dmg | head -1)
          cp "$DEB" rosbag-resurrector_amd64_latest.deb
          cp "$DMG" RosBag-Resurrector-macos-latest.dmg
          ls -lh

      - name: Upload _latest copies back to the release
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: assets
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            rosbag-resurrector_amd64_latest.deb \
            RosBag-Resurrector-macos-latest.dmg \
            -R "${{ github.repository }}" \
            --clobber

      - name: Confirm assets present
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ inputs.release_tag }}" \
            -R "${{ github.repository }}" \
            --json assets -q '.assets[].name'
