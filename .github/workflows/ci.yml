name: CI

# Triggered on every push and PR. Catches the kind of issues that
# slipped through to the v0.3.2 release (the demo command importing
# from `tests.fixtures`, which doesn't ship in the wheel).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Cancel older in-progress runs on the same ref to save Actions minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        # The dedicated `extras-test` job below installs each optional
        # extra and runs the suite end-to-end. Tests gated by
        # `pytest.importorskip("sentence_transformers")` etc. skip
        # cleanly here; they run for real in that job.
        run: pytest tests/ -q

  extras-test:
    # One job per optional extras bundle declared in pyproject.toml.
    # Each installs the extra and runs the full suite — pytest's
    # existing importorskip / skipif gates surface the corresponding
    # tests automatically once the dep is present. This catches bugs
    # like the v0.4.0 search_embeddings BinderException where the
    # SQL plumbing was wrong but the only test exercising it was
    # always skipped because [vision] wasn't in CI.
    #
    # Skipped extras (intentional):
    #   - bridge-live: needs rclpy, only available with a full ROS 2
    #     system install; not pip-installable on a vanilla runner
    #   - vision-openai: needs an OpenAI API key for live tests
    #   - packaging: build tooling (pyinstaller, pyarmor), not feature
    #     code with tests of its own
    name: Extras (${{ matrix.extra }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extra:
          - vision-lite     # PIL + opencv-python-headless
          - vision          # vision-lite + sentence-transformers (downloads CLIP model)
          - all-exports     # zarr + tensorflow-datasets (heavy: TF wheel ~600 MB)
          - watch           # watchdog (tiny)
          - ros1            # rosbags (for legacy .bag reading)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache HuggingFace CLIP model
        # Saves ~600 MB download on every vision-job run after the first.
        # Bump the v# suffix when MODEL_NAME in resurrector/core/vision.py
        # changes so the new model gets fetched fresh.
        if: matrix.extra == 'vision'
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-clip-vit-b32-v1

      - name: Install package + dev + extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,${{ matrix.extra }}]"

      - name: Run pytest
        run: pytest tests/ -q

  wheel-smoke:
    name: Wheel install + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Install wheel into a fresh venv
        # This is the critical step — it's how we catch packaging bugs
        # like v0.3.2's demo command importing from tests.fixtures.
        # The smoke venv has *only* the published wheel and its
        # declared dependencies; nothing from the source tree.
        run: |
          python -m venv smoke_venv
          ./smoke_venv/bin/pip install --upgrade pip
          ./smoke_venv/bin/pip install dist/*.whl
          # pytest is needed to run the smoke test, but we install only
          # pytest itself — not the [dev] extras — so the smoke
          # environment stays close to a real user's setup.
          ./smoke_venv/bin/pip install pytest

      - name: Verify CLI works
        run: |
          ./smoke_venv/bin/resurrector --version
          ./smoke_venv/bin/resurrector doctor

      - name: Run wheel smoke test
        # `-m smoke` runs only test_python_api_smoke.py against the
        # installed wheel. The test imports from `resurrector.demo`
        # (which IS in the wheel) — never from `tests.fixtures` (which
        # isn't). That's the whole point.
        run: |
          ./smoke_venv/bin/python -m pytest tests/test_python_api_smoke.py -v -m smoke

  memory-regression:
    name: Memory regression (slow tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run memory regression suite
        # The `slow` marker is excluded from the default `pytest` run
        # via pyproject.toml addopts; we re-enable it here. The suite
        # builds a 100s synthetic bag and asserts every advertised-as-
        # bounded workflow stays under its peak-RSS budget.
        run: pytest tests/test_streaming_oom.py -m slow -v

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: resurrector/dashboard/app/package-lock.json

      - name: Install + build dashboard
        working-directory: resurrector/dashboard/app
        run: |
          npm ci
          npm run build

  lint:
    name: Lint (compile check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile-check all Python files
        # Lightweight syntax-error catcher. Ruff/mypy are too noisy on
        # the existing codebase — adding them is a v0.5+ task.
        run: python -m compileall resurrector tests
