name: CI

# Triggered on every push and PR. Catches the kind of issues that
# slipped through to the v0.3.2 release (the demo command importing
# from `tests.fixtures`, which doesn't ship in the wheel).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Cancel older in-progress runs on the same ref to save Actions minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        # Skip vision tests (they need the heavy CLIP model + GPU
        # extras) and the slow memory regression suite — the wheel-smoke
        # job below covers the slow tier.
        run: pytest tests/ --ignore=tests/test_vision.py -q

  wheel-smoke:
    name: Wheel install + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Install wheel into a fresh venv
        # This is the critical step — it's how we catch packaging bugs
        # like v0.3.2's demo command importing from tests.fixtures.
        # The smoke venv has *only* the published wheel and its
        # declared dependencies; nothing from the source tree.
        run: |
          python -m venv smoke_venv
          ./smoke_venv/bin/pip install --upgrade pip
          ./smoke_venv/bin/pip install dist/*.whl
          # pytest is needed to run the smoke test, but we install only
          # pytest itself — not the [dev] extras — so the smoke
          # environment stays close to a real user's setup.
          ./smoke_venv/bin/pip install pytest

      - name: Verify CLI works
        run: |
          ./smoke_venv/bin/resurrector --version
          ./smoke_venv/bin/resurrector doctor

      - name: Run wheel smoke test
        # `-m smoke` runs only test_python_api_smoke.py against the
        # installed wheel. The test imports from `resurrector.demo`
        # (which IS in the wheel) — never from `tests.fixtures` (which
        # isn't). That's the whole point.
        run: |
          ./smoke_venv/bin/python -m pytest tests/test_python_api_smoke.py -v -m smoke

  memory-regression:
    name: Memory regression (slow tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run memory regression suite
        # The `slow` marker is excluded from the default `pytest` run
        # via pyproject.toml addopts; we re-enable it here. The suite
        # builds a 100s synthetic bag and asserts every advertised-as-
        # bounded workflow stays under its peak-RSS budget.
        run: pytest tests/test_streaming_oom.py -m slow -v

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: resurrector/dashboard/app/package-lock.json

      - name: Install + build dashboard
        working-directory: resurrector/dashboard/app
        run: |
          npm ci
          npm run build

  lint:
    name: Lint (compile check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile-check all Python files
        # Lightweight syntax-error catcher. Ruff/mypy are too noisy on
        # the existing codebase — adding them is a v0.5+ task.
        run: python -m compileall resurrector tests
